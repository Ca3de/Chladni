<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chladni Plate Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 6px;
            color: #e8d5b7;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 20px;
        }

        .main {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        canvas {
            border: 1px solid #333;
            border-radius: 4px;
            background: #0d0d1a;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 260px;
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #1a1a40;
        }

        .control-group label {
            display: block;
            font-size: 0.78rem;
            color: #aaa;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .control-group .value {
            float: right;
            color: #e8d5b7;
            font-variant-numeric: tabular-nums;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #e8d5b7;
            cursor: pointer;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        button {
            background: #1a1a40;
            color: #ccc;
            border: 1px solid #333;
            padding: 7px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.15s;
        }

        button:hover { background: #2a2a50; border-color: #e8d5b7; color: #e8d5b7; }
        button.active { background: #2a2a50; border-color: #e8d5b7; color: #e8d5b7; }

        .btn-row {
            display: flex;
            gap: 6px;
        }

        .btn-row button { flex: 1; }

        .btn-primary {
            background: #2a1a40 !important;
            border-color: #c9a96e !important;
            color: #e8d5b7 !important;
        }

        .section-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .info {
            font-size: 0.72rem;
            color: #666;
            text-align: center;
            margin-top: 16px;
            max-width: 600px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>CHLADNI PLATE</h1>
    <p class="subtitle">Vibration pattern simulator</p>

    <div class="main">
        <canvas id="plate" width="500" height="500"></canvas>

        <div class="controls">
            <div class="section-label">Frequency Parameters</div>

            <div class="control-group">
                <label>n <span class="value" id="nVal">2</span></label>
                <input type="range" id="nSlider" min="1" max="12" step="0.1" value="2">
            </div>

            <div class="control-group">
                <label>m <span class="value" id="mVal">3</span></label>
                <input type="range" id="mSlider" min="1" max="12" step="0.1" value="3">
            </div>

            <div class="section-label">Plate Settings</div>

            <div class="control-group">
                <label>Amplitude <span class="value" id="ampVal">1.0</span></label>
                <input type="range" id="ampSlider" min="0.1" max="3.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <label>Particle Count <span class="value" id="countVal">8000</span></label>
                <input type="range" id="countSlider" min="1000" max="25000" step="500" value="8000">
            </div>

            <div class="control-group">
                <label>Particle Speed <span class="value" id="speedVal">1.0</span></label>
                <input type="range" id="speedSlider" min="0.2" max="3.0" step="0.1" value="1.0">
            </div>

            <div class="section-label">Presets</div>
            <div class="preset-grid">
                <button onclick="setPreset(2, 3)">n=2, m=3</button>
                <button onclick="setPreset(1, 2)">n=1, m=2</button>
                <button onclick="setPreset(3, 5)">n=3, m=5</button>
                <button onclick="setPreset(4, 7)">n=4, m=7</button>
                <button onclick="setPreset(5, 5)">n=5, m=5</button>
                <button onclick="setPreset(6, 9)">n=6, m=9</button>
                <button onclick="setPreset(7, 3)">n=7, m=3</button>
                <button onclick="setPreset(10, 11)">n=10, m=11</button>
            </div>

            <div class="section-label">Display</div>
            <div class="btn-row">
                <button id="modeParticles" class="active" onclick="setMode('particles')">Particles</button>
                <button id="modeField" onclick="setMode('field')">Field</button>
                <button id="modeBoth" onclick="setMode('both')">Both</button>
            </div>

            <div class="btn-row">
                <button class="btn-primary" onclick="resetParticles()">Scatter</button>
                <button onclick="togglePause()" id="pauseBtn">Pause</button>
            </div>
        </div>
    </div>

    <p class="info">
        Chladni figures emerge when particles on a vibrating plate migrate to the nodal lines — regions of zero displacement.
        The pattern is governed by cos(n&pi;x)&middot;cos(m&pi;y) &plusmn; cos(m&pi;x)&middot;cos(n&pi;y) = 0.
    </p>

    <script>
        const canvas = document.getElementById('plate');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        // State
        let n = 2, m = 3, amplitude = 1.0, speed = 1.0;
        let particleCount = 8000;
        let mode = 'particles'; // 'particles' | 'field' | 'both'
        let paused = false;
        let particles = [];

        // Chladni equation: cos(n*pi*x)*cos(m*pi*y) - cos(m*pi*x)*cos(n*pi*y)
        function chladni(x, y) {
            return Math.cos(n * Math.PI * x) * Math.cos(m * Math.PI * y)
                 - Math.cos(m * Math.PI * x) * Math.cos(n * Math.PI * y);
        }

        // Gradient of the Chladni function (points away from nodal lines)
        function chladniGradient(x, y) {
            const PI = Math.PI;
            const dx = -n * PI * Math.sin(n * PI * x) * Math.cos(m * PI * y)
                      + m * PI * Math.sin(m * PI * x) * Math.cos(n * PI * y);
            const dy = -m * PI * Math.cos(n * PI * x) * Math.sin(m * PI * y)
                      + n * PI * Math.cos(m * PI * x) * Math.sin(n * PI * y);
            return { dx, dy };
        }

        // Initialize particles randomly across the plate
        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random(),
                    y: Math.random(),
                    vx: 0,
                    vy: 0
                });
            }
        }

        function resetParticles() {
            initParticles();
        }

        // Physics step: particles move toward nodal lines
        function updateParticles() {
            if (paused) return;

            const dt = 0.0004 * speed;
            const damping = 0.95;
            const forceScale = amplitude * 0.5;

            for (const p of particles) {
                const val = chladni(p.x, p.y);
                const grad = chladniGradient(p.x, p.y);

                // Force proportional to the function value, pointing toward zero
                // F = -f(x,y) * grad(f) — drives particles toward nodal lines
                const mag = Math.sqrt(grad.dx * grad.dx + grad.dy * grad.dy) + 0.001;
                const fx = -val * grad.dx / mag * forceScale;
                const fy = -val * grad.dy / mag * forceScale;

                p.vx = (p.vx + fx * dt) * damping;
                p.vy = (p.vy + fy * dt) * damping;

                p.x += p.vx * dt;
                p.y += p.vy * dt;

                // Reflect at boundaries
                if (p.x < 0) { p.x = -p.x; p.vx *= -0.5; }
                if (p.x > 1) { p.x = 2 - p.x; p.vx *= -0.5; }
                if (p.y < 0) { p.y = -p.y; p.vy *= -0.5; }
                if (p.y > 1) { p.y = 2 - p.y; p.vy *= -0.5; }
            }
        }

        // Render the displacement field as a heatmap
        function drawField() {
            const imageData = ctx.createImageData(W, H);
            const data = imageData.data;

            for (let py = 0; py < H; py++) {
                for (let px = 0; px < W; px++) {
                    const x = px / W;
                    const y = py / H;
                    const val = chladni(x, y);

                    const idx = (py * W + px) * 4;
                    // Map value to color: blue (negative) - black (zero) - warm (positive)
                    const absVal = Math.min(Math.abs(val) * amplitude, 1);

                    if (val > 0) {
                        data[idx]     = Math.floor(absVal * 180);  // R
                        data[idx + 1] = Math.floor(absVal * 100);  // G
                        data[idx + 2] = Math.floor(absVal * 40);   // B
                    } else {
                        data[idx]     = Math.floor(absVal * 30);
                        data[idx + 1] = Math.floor(absVal * 80);
                        data[idx + 2] = Math.floor(absVal * 160);
                    }
                    data[idx + 3] = 255;
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // Render particles as bright dots
        function drawParticles(clearBg) {
            if (clearBg) {
                ctx.fillStyle = '#0d0d1a';
                ctx.fillRect(0, 0, W, H);
            }

            ctx.fillStyle = 'rgba(232, 213, 183, 0.7)';
            for (const p of particles) {
                const px = p.x * W;
                const py = p.y * H;
                ctx.fillRect(px, py, 1.4, 1.4);
            }
        }

        function draw() {
            if (mode === 'field') {
                drawField();
            } else if (mode === 'particles') {
                drawParticles(true);
            } else {
                drawField();
                drawParticles(false);
            }
        }

        // Main loop
        function loop() {
            for (let i = 0; i < 3; i++) updateParticles(); // multiple substeps
            draw();
            requestAnimationFrame(loop);
        }

        // --- UI Bindings ---
        const nSlider = document.getElementById('nSlider');
        const mSlider = document.getElementById('mSlider');
        const ampSlider = document.getElementById('ampSlider');
        const countSlider = document.getElementById('countSlider');
        const speedSlider = document.getElementById('speedSlider');

        function updateFromSliders() {
            n = parseFloat(nSlider.value);
            m = parseFloat(mSlider.value);
            amplitude = parseFloat(ampSlider.value);
            speed = parseFloat(speedSlider.value);

            document.getElementById('nVal').textContent = n.toFixed(1);
            document.getElementById('mVal').textContent = m.toFixed(1);
            document.getElementById('ampVal').textContent = amplitude.toFixed(1);
            document.getElementById('speedVal').textContent = speed.toFixed(1);

            const newCount = parseInt(countSlider.value);
            document.getElementById('countVal').textContent = newCount;
            if (newCount !== particleCount) {
                particleCount = newCount;
                initParticles();
            }
        }

        nSlider.addEventListener('input', updateFromSliders);
        mSlider.addEventListener('input', updateFromSliders);
        ampSlider.addEventListener('input', updateFromSliders);
        countSlider.addEventListener('input', updateFromSliders);
        speedSlider.addEventListener('input', updateFromSliders);

        function setPreset(newN, newM) {
            nSlider.value = newN;
            mSlider.value = newM;
            updateFromSliders();
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('modeParticles').classList.toggle('active', mode === 'particles');
            document.getElementById('modeField').classList.toggle('active', mode === 'field');
            document.getElementById('modeBoth').classList.toggle('active', mode === 'both');
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
        }

        // Start
        initParticles();
        loop();
    </script>
</body>
</html>
